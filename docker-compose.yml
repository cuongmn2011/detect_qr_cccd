services:
  detectqrcccd-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: detectqrcccd-api
    command: >
      python -m uvicorn service:app
      --host ${APP_HOST:-0.0.0.0}
      --port ${APP_PORT:-8000}
    ports:
      - "${HOST_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
    restart: unless-stopped
    volumes:
      - ./asset:/app/asset:ro
